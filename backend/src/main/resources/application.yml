spring:
  application:
    name: appointment-scheduling-api
  datasource:
    url: jdbc:postgresql://localhost:5432/appointment_scheduling
    username: ${DB_USERNAME:appointment}
    password: ${DB_PASSWORD:appointment}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: true

scheduling:
  security:
    jwt:
      issuer: appointment-scheduling
      access-token-ttl-seconds: 900
      refresh-token-ttl-seconds: 1209600
      signing-key-base64: ${JWT_SIGNING_KEY_BASE64:}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  pii:
    aes-key-base64: ${PII_AES_KEY_BASE64:}
