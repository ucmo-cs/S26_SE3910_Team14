spring:
  application:
    name: appointment-scheduling-api
  datasource:
    url: jdbc:postgresql://aws-1-us-east-2.pooler.supabase.com:6543/postgres?user=postgres.cybkunimttdfxhfvmxvp&password=${DB_PASSWORD}&prepareThreshold=0
    username: postgres
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: true

scheduling:
  security:
    jwt:
      issuer: appointment-scheduling
      access-token-ttl-seconds: 900
      refresh-token-ttl-seconds: 604800
      signing-key-base64: ${JWT_SIGNING_KEY_BASE64:}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  pii:
    aes-key-base64: ${PII_AES_KEY_BASE64:}
  mail:
    enabled: ${SMTP_ENABLED:false}
    from-address: ${SMTP_FROM_ADDRESS:no-reply@centralbank.local}
